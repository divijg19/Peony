name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Format, test, vet, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [[ -n "${files}" ]]; then
            echo "The following files need gofmt:"
            echo "${files}"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build peony
        run: go build -trimpath -o /tmp/peony ./cmd/peony

      - name: Smoke test CLI help
        run: |
          /tmp/peony version
          /tmp/peony help tui
          bash install.sh --help
